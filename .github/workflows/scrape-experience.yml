name: Scrape Tibia Experience

# Hourly trigger from 09:00 to 23:00 UTC (covers Lisbon's 09:00 in both
# winter/summer DST, then keeps checking every hour through the evening so
# fresh guildstats.eu data gets picked up sooner instead of waiting for the
# next fixed slot). The script checks the real Europe/Lisbon time and only
# proceeds once it's past 09:00 there (no upper bound), and skips per
# character/player if today's date is already recorded — so repeated
# triggers the same day are cheap no-ops once data is in. This repo is
# public, so Actions minutes are unlimited; each run only takes ~20-30s.
on:
  schedule:
    - cron: '0 9-23 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run scraper (3 personagens)
        run: node scripts/scrape-experience.mjs
        env:
          # workflow_dispatch (manual runs) always scrape, ignoring the time-of-day check.
          FORCE_SCRAPE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Run scraper (jogadores da Equipa)
        run: node scripts/scrape-team-experience.mjs
        env:
          FORCE_SCRAPE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Commit updated history
        run: |
          git config user.name "tibia-xp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/scraped-history data/team-history
          if git diff --cached --quiet; then
            echo "Sem alterações a commitar."
          else
            git commit -m "chore: atualizar histórico de XP ($(date -u +%Y-%m-%d))"
            git push
          fi
