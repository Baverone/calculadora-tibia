name: Scrape Tibia Experience

# Several UTC triggers spread through the day, covering Lisbon's 09:00 in
# both winter (UTC+0) and summer (UTC+1) DST plus extra safety-net times —
# the script checks the real Europe/Lisbon time and only proceeds once it's
# past 09:00 there (no upper bound), and skips per character if today's
# date is already recorded. So it's safe for multiple triggers to fire the
# same day: GitHub Actions "schedule" runs can be delayed by hours under
# load, and with only 1-2 triggers a delayed run can miss the whole day
# silently (happened 2026-07-10 and 2026-07-11) — more triggers means more
# chances for at least one to land after 09:00 Lisbon.
on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
    - cron: '0 13 * * *'
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run scraper
        run: node scripts/scrape-experience.mjs
        env:
          # workflow_dispatch (manual runs) always scrape, ignoring the time-of-day check.
          FORCE_SCRAPE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

      - name: Commit updated history
        run: |
          git config user.name "tibia-xp-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/scraped-history
          if git diff --cached --quiet; then
            echo "Sem alterações a commitar."
          else
            git commit -m "chore: atualizar histórico de XP ($(date -u +%Y-%m-%d))"
            git push
          fi
